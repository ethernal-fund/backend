# ============================================================================
# render.yaml — Ethernal Backend API
# Infraestructura como código para Render
# Docs: https://render.com/docs/blueprint-spec
#
# ORDEN DE DEPLOY:
#   1. Hacer deploy de este blueprint completo (crea Redis primero)
#   2. Render resuelve REDIS_URL automáticamente desde ethernal-redis
#   3. El web service arranca después de que Redis esté Available
# ============================================================================

services:
  # ── Web Service (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: ethernal-backend
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt

    # $PORT es asignado dinámicamente por Render — NUNCA hardcodear el puerto.
    # -w 1 en free tier (512MB RAM): 2 workers consumen ~400MB+ y causan OOM.
    # Subir a -w 2 solo en paid plan con 1GB+ RAM.
    startCommand: gunicorn api.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT

    # Render llama a este endpoint para saber si el servicio está listo.
    # Debe retornar 2xx. Nuestro /health retorna 200 o 503.
    healthCheckPath: /health

    envVars:
      # ── Runtime ────────────────────────────────────────────────────────────
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: "false"

      - key: LOG_LEVEL
        value: INFO

      # ── CORS ───────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: "https://ethernal.fund,https://www.ethernal.fund,https://frontend-9aivuawfr-ethernalllc-funds-projects.vercel.app"

      # ── Base de datos (Supabase) ────────────────────────────────────────────
      # sync: false → setear manualmente en Render Dashboard → Environment
      - key: DATABASE_URL
        sync: false

      # ── Redis ──────────────────────────────────────────────────────────────
      # Render resuelve esto automáticamente desde el servicio ethernal-redis.
      # Si el blueprint se deploya completo, ethernal-redis se crea primero.
      - key: REDIS_URL
        fromService:
          name: ethernal-redis
          type: redis
          property: connectionString

      # ── Blockchain ─────────────────────────────────────────────────────────
      - key: RPC_URL
        sync: false
      - key: CHAIN_ID
        value: "11155111"

      # ── Contratos ──────────────────────────────────────────────────────────
      - key: FACTORY_ADDRESS
        sync: false
      - key: TREASURY_ADDRESS
        sync: false
      - key: USDC_ADDRESS
        sync: false
      - key: PROTOCOL_REGISTRY_ADDRESS
        sync: false

      # ── Admin ──────────────────────────────────────────────────────────────
      - key: ADMIN_WALLET
        sync: false
      - key: ADMIN_API_KEY
        sync: false

      # ── JWT ────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"

      # ── Faucet ─────────────────────────────────────────────────────────────
      - key: FAUCET_PRIVATE_KEY
        sync: false
      - key: FAUCET_AMOUNT
        value: "10000"
      - key: FAUCET_COOLDOWN_HOURS
        value: "24"

      # ── Rate limiting ──────────────────────────────────────────────────────
      # Mantener en true — Redis está disponible en este deploy
      - key: RATE_LIMIT_ENABLED
        value: "true"

      # ── Sentry (opcional) ──────────────────────────────────────────────────
      - key: SENTRY_ENABLED
        value: "false"
      - key: SENTRY_DSN
        value: ""

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Render crea este servicio ANTES que el web service cuando se usa blueprint.
  - type: redis
    name: ethernal-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    # ipAllowList vacío = solo accesible desde servicios internos de Render (más seguro)
    ipAllowList: []